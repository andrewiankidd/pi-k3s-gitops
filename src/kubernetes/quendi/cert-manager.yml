apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: quendi
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: quendi
  sources:
    - repoURL: https://charts.jetstack.io
      targetRevision: 1.16.2
      chart: cert-manager
      helm:
        # Values file as block file
        values: |
          cert-managerUI:
            # -- Replica count for cert-manager UI.
            replicas: 1
    - repoURL: https://github.com/andrewiankidd/pi-k3s-gitops.git
      targetRevision: feature/master-node
      path: src/kubernetes/quendi/cert-manager
  destination:
    server: https://kubernetes.default.svc
    namespace: quendi-cert-manager
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true