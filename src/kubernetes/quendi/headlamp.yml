apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: headlamp
  namespace: quendi
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: quendi
  sources:
    - repoURL: https://headlamp-k8s.github.io/headlamp/
      targetRevision: 0.27.0
      chart: headlamp
    - repoURL: https://github.com/andrewiankidd/pi-k3s-gitops.git
      targetRevision: feature/master-node
      path: src\kubernetes\quendi\headlamp
  destination:
    server: https://kubernetes.default.svc
    namespace: quendi-headlamp
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true