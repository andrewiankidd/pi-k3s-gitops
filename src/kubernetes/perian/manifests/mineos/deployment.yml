apiVersion: apps/v1
kind: Deployment
metadata:
  name: mineos
  namespace: perian-mineos
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mineos
  template:
    metadata:
      labels:
        app: mineos
    spec:
      containers:
        - name: mineos
          image: greggee/mineos:latest  # Replace with your Docker image
          ports:
            - containerPort: 8443