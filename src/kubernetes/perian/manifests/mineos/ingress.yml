apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mineos-ingress
  namespace: default
spec:
  rules:
    - host: your-domain.com  # Replace with your actual domain
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mineos-service
                port:
                  number: 80
  tls:
    - hosts:
        - your-domain.com  # Ensure you have a TLS secret for HTTPS
      secretName: your-tls-secret
