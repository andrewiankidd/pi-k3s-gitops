apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: crafty-app
  namespace: perian  # Specify the namespace where Argo CD is installed
spec:
  project: perian
  source:
    repoURL: oci://tccr.io/truecharts/crafty-4  # OCI repository URL for the Helm chart
    targetRevision: latest  # This will deploy the latest version of the chart
    chart: crafty-4  # The chart name
    helm:
      values: |  # Use default values from the chart
        # Here you can override the default values if needed
  destination:
    server: https://kubernetes.default.svc
    namespace: perian-crafty  # Namespace where the app will be deployed
  syncPolicy:
    automated:
      prune: true  # Automatically remove resources that are no longer part of the application
      selfHeal: true  # Automatically sync and heal the app if resources go out of sync
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: crafty-ingress
  namespace: perian-crafty
  annotations:
    nginx.ingress.kubernetes.io/limit-rps: "5"
    nginx.ingress.kubernetes.io/limit-rpm: "100"
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    traefik.ingress.kubernetes.io/router.tls: "false"
    kubernetes.io/ingress.class: "traefik"
spec:
  ingressClassName: traefik
  rules:
    - host: crafty.kidd.network
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: crafty
                port:
                  number: 80