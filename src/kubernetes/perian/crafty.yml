apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mineos
  namespace: perian
spec:
  project: perian
  source:
    repoURL: https://github.com/andrewiankidd/pi-k3s-gitops
    targetRevision: feature/master-node
    path: src/kubernetes/perian/manifests/mineos
  destination:
    server: https://kubernetes.default.svc
    namespace: perian-mineos
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true