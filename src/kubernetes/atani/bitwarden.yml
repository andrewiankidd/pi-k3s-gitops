apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bitwarden
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://cdwv.github.io/bitwarden-k8s/
    targetRevision: latest  # Or specify a version if needed
    chart: bitwarden-k8s
    helm:
      values: |
        ingress:
          enabled: true
          host: bitwarden.example.com  # Replace with your desired domain
          path: /
          tls:
            enabled: true
            secretName: bitwarden-tls-secret
        bitwarden_rs:
          dataVolume:
            persistentVolumeClaim: bitwarden-data  # Make sure this PVC exists, or configure your storage
          environment:
            - name: DATABASE_URL
              value: postgres://username:password@hostname/dbname
          externalAuth:
            enabled: false  # Adjust based on your auth requirements
  destination:
    server: https://kubernetes.default.svc
    namespace: bitwarden  # You can specify any desired namespace here
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
